name: Shark Manager Next Build

on:
  push:
    branches: [ "shark-next" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Materialize project
        run: |
          chmod +x ci/shark-next-bootstrap.sh
          ./ci/shark-next-bootstrap.sh
      - name: Build debug APK
        working-directory: project
        run: gradle --no-daemon :app:assembleDebug
      - name: Rename APK
        run: cp project/app/build/outputs/apk/debug/app-debug.apk Shark_Manager_v1.0.0-alpha1-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Shark-Manager-alpha1-debug
          path: Shark_Manager_v1.0.0-alpha1-debug.apk
          if-no-files-found: error
